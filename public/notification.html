<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Notification</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    height: 100%;
    overflow: hidden;
    font-family: 'Geist', -apple-system, system-ui, sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }
  .card {
    position: fixed;
    inset: 8px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px 12px 12px;
    border-radius: 14px;
    background: rgba(22, 22, 24, 0.95);
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
    overflow: hidden;
    cursor: pointer;
    opacity: 1;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .card.exit { opacity: 0; transform: translateX(40px); }
  .accent-bar {
    position: absolute; top: 0; left: 12px; right: 12px; height: 2px;
    border-radius: 1px; opacity: 0.6;
  }
  .icon-wrap {
    flex-shrink: 0; width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-wrap svg { width: 18px; height: 18px; }
  .text { flex: 1; min-width: 0; }
  .title { font-size: 13px; font-weight: 600; color: #fff; line-height: 1.3; letter-spacing: -0.01em; }
  .body {
    font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.4; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .close-btn {
    flex-shrink: 0; background: none; border: none; padding: 4px; cursor: pointer;
    display: flex; align-items: center; opacity: 0.3; margin-top: -2px;
  }
  .close-btn:hover { opacity: 0.7; }
  .close-btn svg { width: 16px; height: 16px; }
  .progress {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 2px;
    opacity: 0.35; transform-origin: left;
  }
  .progress.shrink { animation: shrink var(--dur) linear forwards; }
  @keyframes shrink { from { transform: scaleX(1); } to { transform: scaleX(0); } }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="accent-bar" id="accent"></div>
  <div class="icon-wrap" id="icon-wrap">
    <svg id="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="text">
    <div class="title" id="title"></div>
    <div class="body" id="body"></div>
  </div>
  <button class="close-btn" id="close-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <div class="progress" id="progress"></div>
</div>
<script>
// Read notification data from URL search params
const p = new URLSearchParams(location.search);
const kind = p.get('kind') || 'received';
const title = p.get('title') || '';
const body = p.get('body') || '';
const duration = parseInt(p.get('duration') || '5000', 10);

const COLORS = {
  received: '#4ade80', sent: '#60a5fa', confirmed: '#ccfcfb',
  failed: '#f87171', expired: '#fbbf24', deep_link: '#60a5fa', price_alert: '#c084fc',
};
const ICONS = {
  received: '<circle cx="12" cy="12" r="10" stroke="C" stroke-width="2" fill="none"/><path d="M8 12l3 3 5-5" stroke="C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>',
  sent: '<circle cx="12" cy="12" r="10" stroke="C" stroke-width="2" fill="none"/><path d="M12 16V8m0 0l-3 3m3-3l3 3" stroke="C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>',
  confirmed: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="C" stroke-width="2" fill="none"/><path d="M9 12l2 2 4-4" stroke="C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>',
  failed: '<circle cx="12" cy="12" r="10" stroke="C" stroke-width="2" fill="none"/><path d="M12 8v4m0 4h.01" stroke="C" stroke-width="2" stroke-linecap="round"/>',
  expired: '<circle cx="12" cy="12" r="10" stroke="C" stroke-width="2" fill="none"/><path d="M12 6v6l4 2" stroke="C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>',
  deep_link: '<circle cx="12" cy="12" r="10" stroke="C" stroke-width="2" fill="none"/><path d="M10 14l-1.5-1.5a3.536 3.536 0 010-5l5-5a3.536 3.536 0 015 5L17 9" stroke="C" stroke-width="2" stroke-linecap="round" fill="none"/>',
  price_alert: '<circle cx="12" cy="12" r="10" stroke="C" stroke-width="2" fill="none"/><path d="M13 2.05s-1.5 4-4.5 6c-3 2-3 6 0 8s6.5 2 8-1" stroke="C" stroke-width="2" stroke-linecap="round" fill="none"/>',
};

const color = COLORS[kind] || COLORS.received;

// Set accent bar gradient
document.getElementById('accent').style.background =
  `linear-gradient(90deg, ${color}00, ${color}, ${color}00)`;

// Set icon
document.getElementById('icon-wrap').style.background = color + '18';
const iconSvg = (ICONS[kind] || ICONS.received).replace(/C/g, color);
document.getElementById('icon').innerHTML = iconSvg;

// Set text
document.getElementById('title').textContent = title;
document.getElementById('body').textContent = body;

// Progress bar
const progress = document.getElementById('progress');
progress.style.background = color;
progress.style.setProperty('--dur', duration + 'ms');
progress.classList.add('shrink');

// Close function
function close() {
  const card = document.getElementById('card');
  card.classList.add('exit');
  setTimeout(() => {
    try { window.__TAURI_INTERNALS__ && location.reload(); } catch(e) {}
    // Try Tauri close
    if (window.__TAURI_INTERNALS__) {
      import('https://unpkg.com/@tauri-apps/api@2/core').then(m => {
        m.invoke('__close_notification');
      }).catch(() => {});
    }
  }, 200);
}

// Click to dismiss
document.getElementById('card').addEventListener('click', close);
document.getElementById('close-btn').addEventListener('click', (e) => { e.stopPropagation(); close(); });

// Auto-close
if (duration > 0) setTimeout(close, duration);
</script>
</body>
</html>
