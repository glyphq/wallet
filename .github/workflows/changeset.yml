name: Changesets

on:
  push:
    branches: [main]

concurrency:
  group: changeset-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.14"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version-or-dispatch:
    name: Version packages or dispatch release
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create version PR or release tag
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: bun run version
          publish: bun run tag-release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read release request
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f .release-requested ]]; then
            tag="$(tr -d '\r\n' < .release-requested)"
            [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
            echo "requested=true" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          else
            echo "requested=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch isolated release pipeline
        if: steps.release.outputs.requested == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: gh workflow run release.yml --ref main --field "tag=${RELEASE_TAG}"
