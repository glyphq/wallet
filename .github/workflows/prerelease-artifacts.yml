name: Prerelease artifacts

on:
  push:
    branches: [prerelease]
  workflow_dispatch:

concurrency:
  group: prerelease-artifacts-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.14"
  RUST_VERSION: "1.88.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_CHANNEL: prerelease

permissions:
  contents: read

jobs:
  build-linux:
    name: Build Linux prerelease artifacts
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install minimal Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libdbus-1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            xdg-utils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Configure sccache
        uses: mozilla/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9

      - name: Cache Rust registry and sources
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
          cache-targets: "false"
          cache-on-failure: "true"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Configure prerelease updater channel
        run: node scripts/set-updater-channel.mjs prerelease

      - name: Prepare deterministic Tauri Linux bundler state
        run: |
          rm -rf \
            src-tauri/target/release/bundle/appimage/*.AppDir \
            src-tauri/target/release/bundle/appimage_deb
          scripts/prepare-tauri-linux-tools.sh

      - name: Build Linux bundles
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          rm -rf \
            src-tauri/target/release/bundle/appimage/*.AppDir \
            src-tauri/target/release/bundle/appimage_deb
          bun tauri build --bundles appimage --ci
          bun tauri build --bundles deb,rpm --ci --config configs/tauri-linux-packages.json

      - name: Stage Linux artifacts
        run: |
          set -euo pipefail
          mkdir -p prerelease-artifacts/linux
          find src-tauri/target/release/bundle/appimage -maxdepth 1 -type f \( -name '*.AppImage' -o -name '*.AppImage.sig' \) -exec cp {} prerelease-artifacts/linux/ \;
          find src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' -exec cp {} prerelease-artifacts/linux/ \;
          find src-tauri/target/release/bundle/rpm -maxdepth 1 -type f -name '*.rpm' -exec cp {} prerelease-artifacts/linux/ \;
          compgen -G 'prerelease-artifacts/linux/*' >/dev/null
          (cd prerelease-artifacts/linux && sha256sum ./* > SHA256SUMS.txt)

      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: glyph-prerelease-linux-${{ github.sha }}
          path: prerelease-artifacts/linux
          if-no-files-found: error
          retention-days: 14

  build-macos:
    name: Build macOS prerelease artifacts
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Configure sccache
        uses: mozilla/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9

      - name: Cache Rust registry and sources
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
          cache-targets: "false"
          cache-on-failure: "true"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Configure prerelease updater channel
        run: node scripts/set-updater-channel.mjs prerelease

      - name: Determine macOS signing mode
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [[ -n "$APPLE_CERTIFICATE" && -n "$APPLE_CERTIFICATE_PASSWORD" && -n "$APPLE_ID" && -n "$APPLE_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            echo "MACOS_CODE_SIGNING_ENABLED=1" >> "$GITHUB_ENV"
          else
            echo "MACOS_CODE_SIGNING_ENABLED=0" >> "$GITHUB_ENV"
            echo "::notice::Building unsigned macOS prerelease artifacts because notarization secrets are incomplete."
          fi

      - name: Build universal macOS bundles
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [[ "$MACOS_CODE_SIGNING_ENABLED" == "1" ]]; then
            bun tauri build --target universal-apple-darwin --ci
          else
            unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
            bun tauri build --target universal-apple-darwin --ci --config '{"bundle":{"macOS":{"signingIdentity":null}}}'
          fi

      - name: Stage macOS artifacts
        run: |
          set -euo pipefail
          mkdir -p prerelease-artifacts/macos
          find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -type f \( -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \) -exec cp {} prerelease-artifacts/macos/ \;
          find src-tauri/target/universal-apple-darwin/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' -exec cp {} prerelease-artifacts/macos/ \;
          compgen -G 'prerelease-artifacts/macos/*' >/dev/null
          (cd prerelease-artifacts/macos && shasum -a 256 ./* > SHA256SUMS.txt)

      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: glyph-prerelease-macos-${{ github.sha }}
          path: prerelease-artifacts/macos
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows prerelease artifacts
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Configure sccache
        uses: mozilla/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9

      - name: Cache Rust registry and sources
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
          cache-targets: "false"
          cache-on-failure: "true"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Configure prerelease updater channel
        run: node scripts/set-updater-channel.mjs prerelease

      - name: Determine Windows signing mode
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            "WINDOWS_CODE_SIGNING_ENABLED=0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "::notice::Building unsigned Windows prerelease artifacts because signing secrets are incomplete."
            exit 0
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "glyph-signing-certificate.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificates = @(Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password)
          $certificate = $certificates | Where-Object HasPrivateKey | Select-Object -First 1
          if ($null -eq $certificate) { throw "Imported Windows certificate has no private key" }
          "WINDOWS_CERTIFICATE_THUMBPRINT=$($certificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WINDOWS_CODE_SIGNING_ENABLED=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build NSIS installer
        shell: pwsh
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          if ($env:WINDOWS_CODE_SIGNING_ENABLED -eq "1") {
            $config = @{
              bundle = @{
                windows = @{
                  certificateThumbprint = $env:WINDOWS_CERTIFICATE_THUMBPRINT
                  digestAlgorithm = "sha256"
                  timestampUrl = "http://timestamp.digicert.com"
                }
              }
            } | ConvertTo-Json -Compress -Depth 4
            bun tauri build --bundles nsis --ci --config $config
          } else {
            bun tauri build --bundles nsis --ci
          }

      - name: Stage Windows artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path prerelease-artifacts/windows | Out-Null
          Get-ChildItem "src-tauri/target/release/bundle/nsis" -File -Filter "*.exe" | Copy-Item -Destination prerelease-artifacts/windows
          Get-ChildItem "src-tauri/target/release/bundle/nsis" -File -Filter "*.sig" -ErrorAction SilentlyContinue | Copy-Item -Destination prerelease-artifacts/windows
          $files = @(Get-ChildItem prerelease-artifacts/windows -File)
          if ($files.Count -eq 0) { throw "No Windows prerelease artifacts were produced" }
          $hashes = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $hashes | Set-Content prerelease-artifacts/windows/SHA256SUMS.txt

      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: glyph-prerelease-windows-${{ github.sha }}
          path: prerelease-artifacts/windows
          if-no-files-found: error
          retention-days: 14
