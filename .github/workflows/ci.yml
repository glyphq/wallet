name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-22.04
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun tauri build

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: sigil-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: sigil-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app (universal)
        run: bun tauri build --target universal-apple-darwin

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: sigil-macos-app
          path: src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: warn

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: sigil-macos-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun tauri build

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: sigil-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: sigil-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
