name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'sponsors.json'
      - '.changeset/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'sponsors.json'
      - '.changeset/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.14"
  RUST_VERSION: "1.88.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  frontend-and-release-quality:
    name: Frontend, tests, and workflow quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend checks
        run: bun run check

      - name: Verify synchronized release versions
        run: node scripts/sync-version.mjs --check

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck

      - name: Lint workflows and release scripts
        run: scripts/lint-workflows.sh

  rust-linux:
    name: Rust check (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install minimal Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libdbus-1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Check locked Rust build
        run: cargo check --manifest-path src-tauri/Cargo.toml --locked

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Audit JS dependencies
        run: bun audit --audit-level=high

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo-audit
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-0.22.2-${{ runner.os }}

      - name: Install cargo-audit
        run: command -v cargo-audit >/dev/null || cargo install cargo-audit --version 0.22.2 --locked

      - name: Audit Rust dependencies
        run: cargo audit
        working-directory: src-tauri
