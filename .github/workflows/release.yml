name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build, for example v0.14.2
        required: true
        type: string

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

env:
  BUN_VERSION: "1.3.14"
  RUST_VERSION: "1.88.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-release:
    name: Validate tag and prepare draft release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.release.outputs.version }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Validate tag and synchronized versions
        id: release
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          version="${RELEASE_TAG#v}"
          [[ "$(node -p "require('./package.json').version")" == "$version" ]]
          node scripts/sync-version.mjs --check
          git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}" >/dev/null
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create or reuse draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          node scripts/extract-changelog.mjs "$VERSION" > release-notes.md
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')"
            [[ "$is_draft" == "true" ]] || {
              echo "Release $RELEASE_TAG is already published and immutable" >&2
              exit 1
            }
            echo "Draft release $RELEASE_TAG already exists; assets will be replaced idempotently."
          else
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --draft \
              --title "Glyph $VERSION" \
              --notes-file release-notes.md
          fi

  release-linux:
    name: Build Linux bundles
    runs-on: ubuntu-22.04
    needs: prepare-release
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install minimal Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libdbus-1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            xdg-utils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Configure sccache
        uses: mozilla/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9

      - name: Cache Rust registry and sources
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
          cache-targets: "false"
          cache-on-failure: "true"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Prepare deterministic Tauri Linux bundler state
        run: |
          rm -rf \
            src-tauri/target/release/bundle/appimage/*.AppDir \
            src-tauri/target/release/bundle/appimage_deb
          scripts/prepare-tauri-linux-tools.sh

      - name: Validate updater signing credentials
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          [[ -n "$TAURI_SIGNING_PRIVATE_KEY" ]] || { echo "TAURI_SIGNING_PRIVATE_KEY is required" >&2; exit 1; }
          [[ -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]] || { echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is required" >&2; exit 1; }

      - name: Build signed AppImage
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          rm -rf \
            src-tauri/target/release/bundle/appimage/*.AppDir \
            src-tauri/target/release/bundle/appimage_deb
          bun tauri build --bundles appimage --ci

      - name: Build signed Linux packages
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun tauri build --bundles deb,rpm --ci --config configs/tauri-linux-packages.json

      - name: Patch and re-sign AppImage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mapfile -t appimages < <(find src-tauri/target/release/bundle/appimage -maxdepth 1 -type f -name '*.AppImage' | sort)
          [[ ${#appimages[@]} -eq 1 ]]
          appimage="${appimages[0]}"
          scripts/patch-appimage.sh "$appimage"
          rm -f "${appimage}.sig"
          bun tauri signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$appimage"

      - name: Validate Linux bundles
        env:
          REQUIRE_SIGNATURES: "1"
        run: scripts/validate-linux-bundles.sh src-tauri/target/release/bundle "${{ needs.prepare-release.outputs.version }}"

      - name: Create Linux checksums
        run: |
          set -euo pipefail
          mapfile -t artifacts < <(find src-tauri/target/release/bundle/{appimage,deb,rpm} \
            -maxdepth 1 -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) | sort)
          [[ ${#artifacts[@]} -eq 3 ]]
          sha256sum "${artifacts[@]}" | sed -E 's#  .*/#  #' > SHA256SUMS-linux.txt

      - name: Upload Linux assets to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find src-tauri/target/release/bundle/{appimage,deb,rpm} \
            -maxdepth 1 -type f \( -name '*.AppImage' -o -name '*.AppImage.sig' -o -name '*.deb' -o -name '*.rpm' \) | sort)
          [[ ${#assets[@]} -eq 4 ]]
          gh release upload "$RELEASE_TAG" "${assets[@]}" SHA256SUMS-linux.txt --clobber

  release-macos:
    name: Build macOS bundles
    runs-on: macos-latest
    needs: prepare-release
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Configure sccache
        uses: mozilla/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9

      - name: Cache Rust registry and sources
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
          cache-targets: "false"
          cache-on-failure: "true"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Determine macOS signing mode
        id: macos-signing
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          for name in TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD; do
            [[ -n "${!name}" ]] || { echo "$name is required" >&2; exit 1; }
          done
          missing=()
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            [[ -n "${!name}" ]] || missing+=("$name")
          done
          if [[ ${#missing[@]} -eq 0 ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "MACOS_CODE_SIGNING_ENABLED=1" >> "$GITHUB_ENV"
            echo "macOS code signing and notarization are enabled."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "MACOS_CODE_SIGNING_ENABLED=0" >> "$GITHUB_ENV"
            printf '::notice::Skipping macOS code signing and notarization because these secrets are missing: %s\n' "${missing[*]}"
          fi

      - name: Build universal macOS bundles
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [[ "$MACOS_CODE_SIGNING_ENABLED" == "1" ]]; then
            bun tauri build --target universal-apple-darwin --ci
          else
            unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
            bun tauri build --target universal-apple-darwin --ci --config '{"bundle":{"macOS":{"signingIdentity":null}}}'
          fi

      - name: Normalize versioned macOS updater artifact names
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          bundle_root="src-tauri/target/universal-apple-darwin/release/bundle/macos"
          archives=("$bundle_root"/*.app.tar.gz)
          signatures=("$bundle_root"/*.app.tar.gz.sig)
          [[ ${#archives[@]} -eq 1 && ${#signatures[@]} -eq 1 ]]
          target="$bundle_root/Glyph_${VERSION}_universal.app.tar.gz"
          mv "${archives[0]}" "$target"
          mv "${signatures[0]}" "$target.sig"

      - name: Validate macOS bundles
        run: |
          set -euo pipefail
          shopt -s nullglob
          bundle_root="src-tauri/target/universal-apple-darwin/release/bundle"
          archives=("$bundle_root"/macos/*.app.tar.gz)
          signatures=("$bundle_root"/macos/*.app.tar.gz.sig)
          images=("$bundle_root"/dmg/*.dmg)
          apps=("$bundle_root"/macos/*.app)
          [[ ${#archives[@]} -eq 1 && ${#signatures[@]} -eq 1 && ${#images[@]} -eq 1 && ${#apps[@]} -eq 1 ]]
          [[ -s "${archives[0]}" && -s "${signatures[0]}" && -s "${images[0]}" ]]
          binary="${apps[0]}/Contents/MacOS/glyph-wallet"
          [[ -x "$binary" ]]
          lipo "$binary" -verify_arch x86_64 arm64
          if [[ "$MACOS_CODE_SIGNING_ENABLED" == "1" ]]; then
            codesign --verify --deep --strict --verbose=2 "${apps[0]}"
            codesign --verify --deep --strict --verbose=2 "${images[0]}"
            xcrun stapler validate "${images[0]}"
            spctl --assess --type open --context context:primary-signature --verbose=4 "${images[0]}"
          else
            echo "::notice::Skipping macOS codesign, notarization, and Gatekeeper validation for unsigned release artifacts."
          fi
          shasum -a 256 "${archives[0]}" "${images[0]}" | sed -E 's#  .*/#  #' > SHA256SUMS-macos.txt

      - name: Upload macOS assets to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          bundle_root="src-tauri/target/universal-apple-darwin/release/bundle"
          assets=("$bundle_root"/macos/*.app.tar.gz "$bundle_root"/macos/*.app.tar.gz.sig "$bundle_root"/dmg/*.dmg)
          [[ ${#assets[@]} -eq 3 ]]
          gh release upload "$RELEASE_TAG" "${assets[@]}" SHA256SUMS-macos.txt --clobber

  release-windows:
    name: Build Windows bundle
    runs-on: windows-latest
    needs: prepare-release
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Configure sccache
        uses: mozilla/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9

      - name: Cache Rust registry and sources
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
          cache-targets: "false"
          cache-on-failure: "true"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Determine Windows signing mode
        id: windows-signing
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          foreach ($name in @("TAURI_SIGNING_PRIVATE_KEY", "TAURI_SIGNING_PRIVATE_KEY_PASSWORD")) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) { throw "$name is required" }
          }
          $missing = @()
          foreach ($name in @("WINDOWS_CERTIFICATE", "WINDOWS_CERTIFICATE_PASSWORD")) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) { $missing += $name }
          }
          if ($missing.Count -gt 0) {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "WINDOWS_CODE_SIGNING_ENABLED=0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "::notice::Skipping Windows Authenticode signing because these secrets are missing: $($missing -join ', ')"
            exit 0
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "glyph-signing-certificate.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificates = @(Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password)
          $certificate = $certificates | Where-Object HasPrivateKey | Select-Object -First 1
          if ($null -eq $certificate) { throw "Imported Windows certificate has no private key" }
          "WINDOWS_CERTIFICATE_THUMBPRINT=$($certificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WINDOWS_CODE_SIGNING_ENABLED=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build NSIS installer
        shell: pwsh
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          if ($env:WINDOWS_CODE_SIGNING_ENABLED -eq "1") {
            $config = @{
              bundle = @{
                windows = @{
                  certificateThumbprint = $env:WINDOWS_CERTIFICATE_THUMBPRINT
                  digestAlgorithm = "sha256"
                  timestampUrl = "http://timestamp.digicert.com"
                }
              }
            } | ConvertTo-Json -Compress -Depth 4
            bun tauri build --bundles nsis --ci --config $config
          } else {
            bun tauri build --bundles nsis --ci
          }

      - name: Validate and upload Windows assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          $ErrorActionPreference = "Stop"
          $installers = @(Get-ChildItem "src-tauri/target/release/bundle/nsis" -File -Filter "*.exe")
          if ($installers.Count -ne 1) { throw "Expected one NSIS installer, found $($installers.Count)" }
          $installer = $installers[0]
          $signature = Get-Item "$($installer.FullName).sig"
          if ($installer.Length -le 0 -or $signature.Length -le 0) { throw "Installer or updater signature is empty" }
          $authenticode = Get-AuthenticodeSignature $installer.FullName
          if ($env:WINDOWS_CODE_SIGNING_ENABLED -eq "1") {
            if ($authenticode.Status -ne "Valid") { throw "Installer Authenticode status is $($authenticode.Status): $($authenticode.StatusMessage)" }
            if ($null -eq $authenticode.TimeStamperCertificate) { throw "Installer signature is not timestamped" }
          } else {
            Write-Host "::notice::Skipping Windows Authenticode validation for unsigned installer. Status: $($authenticode.Status)"
          }
          $hash = (Get-FileHash -Algorithm SHA256 $installer.FullName).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content -NoNewline SHA256SUMS-windows.txt
          gh release upload $env:RELEASE_TAG $installer.FullName $signature.FullName SHA256SUMS-windows.txt --clobber

  create-manifest:
    name: Create updater manifest
    runs-on: ubuntu-latest
    needs: [prepare-release, release-linux, release-macos, release-windows]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag }}

      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
          GH_REPO: ${{ github.repository }}
        run: |
          scripts/create-updater-manifest.sh "$RELEASE_TAG" "$GH_REPO" latest.json
          gh release upload "$RELEASE_TAG" latest.json --clobber

  publish-release:
    name: Validate and publish release
    runs-on: ubuntu-latest
    needs: [prepare-release, create-manifest]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install updater signature verifier
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends minisign

      - name: Validate complete release asset set
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
          GH_REPO: ${{ github.repository }}
        run: node scripts/validate-release-assets.mjs "$RELEASE_TAG" "$GH_REPO"

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: gh release edit "$RELEASE_TAG" --draft=false --latest
